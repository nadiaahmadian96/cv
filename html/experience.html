  <!-- EXPERIENCE -->
  <section id="experience">
    <div class="section-inner">
      <div class="reveal">
        <span class="section-label">/ Work History</span>
        <h2 class="section-heading">Where I've<br><em>made an impact.</em></h2>
      </div>
      <div class="exp-list">

        <!-- ── MacBook 01 ── -->
        <div class="macbook-exp reveal" data-job="ashna">
          <div class="macbook">
            <div class="mac-camera-bar"><div class="mac-cam-dot"></div></div>
            <div class="mac-screen">
              <div class="mac-off-state">
                <button class="mac-power-btn" aria-label="Power on">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                    <path d="M12 2v7"/><path d="M6.3 5.3a9 9 0 1 0 11.4 0"/>
                  </svg>
                </button>
                <span class="mac-power-label">click to boot</span>
              </div>
              <div class="mac-on-state" hidden>
                <div class="mac-toolbar">
                  <span class="mac-dot r"></span><span class="mac-dot y"></span><span class="mac-dot g"></span>
                  <span class="mac-addr"></span>
                  <span class="mac-meta-badge"></span>
                </div>
                <div class="mac-editor">
                  <div class="mac-code-out"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="macbook-base"></div>
          <div class="macbook-shadow"></div>
        </div>
